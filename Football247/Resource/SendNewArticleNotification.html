<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Football247 - Bài viết mới</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 600px;
            margin: 20px auto;
            border: 1px solid #eee;
            border-radius: 8px;
            overflow: hidden;
        }

        .header {
            background-color: #60d1ac;
            padding: 20px;
            text-align: center;
            color: white;
        }

            .header h1 {
                margin: 0;
                font-size: 24px;
                text-transform: uppercase;
                letter-spacing: 2px;
            }

        .content {
            padding: 30px;
        }

        .article-box {
            border-left: 5px solid #60d1ac;
            background-color: #f9f9f9;
            padding: 20px;
            margin: 20px 0;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }

        .article-title {
            color: #2c3e50;
            margin-top: 0;
            font-size: 20px;
            font-weight: bold;
        }

        .article-desc {
            color: #7f8c8d;
            font-size: 15px;
            margin-bottom: 0;
        }

        .footer {
            background-color: #f4f4f4;
            padding: 15px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }

        .btn {
            display: inline-block;
            padding: 12px 25px;
            background-color: #60d1ac;
            color: white !important;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
            margin-top: 15px;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Football 247</h1>
        </div>
        <div class="content">
            <p>Chào bạn, một tin tức bóng đá nóng hổi vừa được đăng tải!</p>

            <!-- Click vào toàn bộ box để xem bài viết -->
            <a href="[BaseUrl]/articles/[Slug]" class="article-box">
                <h2 class="article-title">[Title]</h2>
                <p class="article-desc">[Description]</p>
                <div style="text-align: right;">
                    <span class="btn">Đọc ngay</span>
                </div>
            </a>

            <p style="font-size: 13px; color: #666;">
                Bạn nhận được thông báo này vì đã đăng ký nhận tin từ Football247.
                Nếu không muốn nhận nữa, bạn có thể tắt trong phần cài đặt tài khoản.
            </p>
        </div>
        <div class="footer">
            &copy; 2026 Football247. All rights reserved.
        </div>
    </div>
</body>
</html>
